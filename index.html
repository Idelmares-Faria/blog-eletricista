<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog do Eletricista — Dicas e Tutoriais de Elétrica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ======== NAVBAR ======== -->
  <header class="navbar">
    <div class="navbar__inner container">
      <a href="/" class="navbar__logo">Blog do Eletricista</a>
      <nav class="navbar__menu" id="navMenu">
        <a href="/" class="navbar__link navbar__link--active">Blog</a>
        <a href="/categorias" class="navbar__link">Estratégias</a>
        <a href="/sobre" class="navbar__link">Sobre</a>
        <a href="/newsletter" class="navbar__link">Newsletter</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Alternar tema">
          <svg class="theme-toggle__icon theme-toggle__icon--sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-toggle__icon theme-toggle__icon--moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </nav>
      <button class="navbar__hamburger" id="hamburgerBtn" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ======== HERO ======== -->
  <section class="hero">
    <div class="hero__inner container">
      <h1 class="hero__title">Blog do Eletricista</h1>
    </div>
  </section>

  <!-- ======== RECENT POSTS ======== -->
  <section class="section recent-posts">
    <div class="container">
      <h2 class="section__heading">Posts recentes</h2>
      <div class="recent-posts__grid" id="recentPostsGrid">
        <div class="post-card post-card--featured" style="opacity:0.3">
          <div class="post-card__body"><p>Carregando...</p></div>
        </div>
      </div>
    </div>
  </section>

  <!-- ======== ALL POSTS ======== -->
  <section class="section all-posts">
    <div class="container">
      <h2 class="section__heading">Todos os posts</h2>
      <div class="all-posts__grid" id="allPostsGrid"></div>
      <div class="pagination" id="pagination" style="display:none">
        <button class="pagination__btn pagination__btn--prev" id="btnPrev">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Anterior
        </button>
        <div class="pagination__numbers" id="paginationNums"></div>
        <button class="pagination__btn pagination__btn--next" id="btnNext">
          Próximo
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ======== FOOTER ======== -->
  <footer class="footer">
    <div class="footer__inner container">
      <p class="footer__copy">&copy; 2026 Blog do Eletricista</p>
      <nav class="footer__links">
        <a href="#">Instagram</a>
        <a href="#">LinkedIn</a>
        <a href="#">YouTube</a>
        <a href="#">Email</a>
        <a href="#">RSS feed</a>
      </nav>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
